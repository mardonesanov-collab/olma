# ==========================================================
# SERVER
# ==========================================================
server.port=8080
app.base-url=${APP_BASE_URL:https://fringe-clench-floral.ngrok-free.dev}
app.upload.dir=./uploads

# ==========================================================
# TELEGRAM BOT
# ==========================================================
bot.enabled=${BOT_ENABLED:true}
bot.token=${BOT_TOKEN:8912037376:AAEtthe1qB2WBKUEoYrgmNMJXKTm4kgSkN0}
bot.username=${BOT_USERNAME:MenuPointBot}
bot.admin.id=${BOT_ADMIN_ID:1034539173}

spring.thymeleaf.check-template-location=false

# ==========================================================
# H2 (vaqtinchalik, in-memory — Docker/PostgreSQL siz)
# ==========================================================
spring.datasource.url=jdbc:h2:mem:menubot;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.packages-to-scan=com.example.menubot.domain.entity

spring.flyway.enabled=false

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ==========================================================
# STATIC & UPLOADS
# ==========================================================
spring.web.resources.static-locations=classpath:/static/,file:./uploads/
spring.web.resources.cache.period=0

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=12MB

# ==========================================================
# LOGGING
# ==========================================================
logging.level.root=INFO
logging.level.org.telegram=WARN
